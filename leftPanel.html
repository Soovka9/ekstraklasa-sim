<div id="leftPanel" style="background-color:#0F172A; width:20.27cm; height:19cm; position:relative;">
 <!-- Rows will be injected by script -->
</div>

<script>
const leftPanel = document.getElementById('leftPanel');

// row colours and counts
const rowData = [
 {count:1, color:'#071323'},      // first row
 {count:2, color:'#3CF4F4'},      // rows 2-3
 {count:2, color:'#D9D9D9'},      // rows 4-5
 {count:11, color:'#071323'},     // rows 6-16
 {count:3, color:'#C00000'}       // rows 17-19
];

// width of rectangles in cm
const widths = [0.95, 6.25, 1.5, 1.3, 1.3, 1.3, 1.85, 1.65, 2.8];
const rowHeight = 0.7;  // cm
const circleRadius = 0.2; // cm

function cmToPx(cm) {
 return cm * 37.8; // approximate px per cm
}

let currentTop = 0;
let rowIndex = 0;

rowData.forEach(group => {
 for(let i=0; i<group.count; i++){
   const row = document.createElement('div');
   row.style.position = 'absolute';
   row.style.top  = cmToPx(currentTop) + 'px';
   row.style.left = '0px';
   row.style.height = cmToPx(rowHeight) + 'px';
   row.style.width = '100%';
   row.style.display = 'flex';

   // ✅ ADDED: identify row
   row.dataset.row = rowIndex;

   widths.forEach((w, colIndex) => {
     const rect = document.createElement('div');
     rect.style.width = cmToPx(w) + 'px';
     rect.style.height = '100%';
     rect.style.backgroundColor = (colIndex===widths.length-1 && rowIndex>0) ? '#071323' : group.color;
     rect.style.position = 'relative';
     rect.style.border='1px solid #223F59'; // optional: to see boundaries

     // ✅ ADDED: identify cell
     rect.dataset.row = rowIndex;
     rect.dataset.col = colIndex;

     // last column circles for rows 2-19
     if(colIndex === widths.length-1 && rowIndex>0){
       for(let c=0; c<5; c++){
         const circle = document.createElement('div');
         circle.style.width = cmToPx(circleRadius*2) + 'px';
         circle.style.height = cmToPx(circleRadius*2) + 'px';
         circle.style.borderRadius = '50%';
         circle.style.backgroundColor = '#FFF'; // default empty circle
         circle.style.position = 'absolute';
         circle.style.left = (c * cmToPx(circleRadius*2.5)) + 'px';
         circle.style.top  = '50%';
         circle.style.transform = 'translateY(-50%)';

         // ✅ ADDED: identify circle
         circle.dataset.row = rowIndex;
         circle.dataset.circle  = c;

         rect.appendChild(circle);
       }
     }

     row.appendChild(rect);
   });

   leftPanel.appendChild(row);
   currentTop += rowHeight;
   rowIndex++;
 }
});
</script>
